version: '3.1'
intents:
- affirm
- confirm_symptoms
- deny
- goodbye
- greet
- select_diseases
- select_symptom
- start_over
- symptom_checker
entities:
- symptom
- disease
slots:
  symptoms:
    type: list
    mappings:
    - type: custom
  flu_symptoms:
    type: text
    mappings:
    - type: from_intent
      intent: deny
      value: false
      conditions:
      - active_loop: symptom_checker_form
        requested_slot: flu_symptoms
    - type: from_entity
      entity: symptom
      conditions:
      - active_loop: symptom_checker_form
        requested_slot: flu_symptoms
  respiratory_symptoms:
    type: text
    mappings:
    - type: from_intent
      intent: deny
      value: false
      conditions:
      - active_loop: symptom_checker_form
        requested_slot: respiratory_symptoms
    - type: from_entity
      entity: symptom
      conditions:
      - active_loop: symptom_checker_form
        requested_slot: respiratory_symptoms
  gastro_symptoms:
    type: text
    mappings:
    - type: from_intent
      intent: deny
      value: false
      conditions:
      - active_loop: symptom_checker_form
        requested_slot: gastro_symptoms
    - type: from_entity
      entity: symptom
      conditions:
      - active_loop: symptom_checker_form
        requested_slot: gastro_symptoms
  neuro_symptoms:
    type: text
    mappings:
    - type: from_intent
      intent: deny
      value: false
      conditions:
      - active_loop: symptom_checker_form
        requested_slot: neuro_symptoms
    - type: from_entity
      entity: symptom
      conditions:
      - active_loop: symptom_checker_form
        requested_slot: neuro_symptoms
  body_pain_symptoms:
    type: text
    mappings:
    - type: from_intent
      intent: deny
      value: false
      conditions:
      - active_loop: symptom_checker_form
        requested_slot: body_pain_symptoms
    - type: from_entity
      entity: symptom
      conditions:
      - active_loop: symptom_checker_form
        requested_slot: body_pain_symptoms
  skin_nails_symptoms:
    type: text
    mappings:
    - type: from_intent
      intent: deny
      value: false
      conditions:
      - active_loop: symptom_checker_form
        requested_slot: skin_nails_symptoms
    - type: from_entity
      entity: symptom
      conditions:
      - active_loop: symptom_checker_form
        requested_slot: skin_nails_symptoms
  internal_itching_symptoms:
    type: text
    mappings:
    - type: from_intent
      intent: deny
      value: false
      conditions:
      - active_loop: symptom_checker_form
        requested_slot: internal_itching_symptoms
    - type: from_intent
      intent: affirm
      value: true
      conditions:
      - active_loop: symptom_checker_form
        requested_slot: internal_itching_symptoms
  blood_transfusions:
    type: text
    mappings:
    - type: from_intent
      intent: deny
      value: false
      conditions:
      - active_loop: symptom_checker_form
        requested_slot: blood_transfusions
    - type: from_intent
      intent: affirm
      value: true
      conditions:
      - active_loop: symptom_checker_form
        requested_slot: blood_transfusions
  alcohol_consumption:
    type: text
    mappings:
    - type: from_intent
      intent: deny
      value: false
      conditions:
      - active_loop: symptom_checker_form
        requested_slot: alcohol_consumption
    - type: from_intent
      intent: affirm
      value: true
      conditions:
      - active_loop: symptom_checker_form
        requested_slot: alcohol_consumption
  appearance_symptoms:
    type: text
    mappings:
    - type: from_intent
      intent: deny
      value: false
      conditions:
      - active_loop: symptom_checker_form
        requested_slot: appearance_symptoms
    - type: from_entity
      entity: symptom
      conditions:
      - active_loop: symptom_checker_form
        requested_slot: appearance_symptoms
  reproductive_symptoms:
    type: text
    mappings:
    - type: from_intent
      intent: deny
      value: false
      conditions:
      - active_loop: symptom_checker_form
        requested_slot: reproductive_symptoms
    - type: from_intent
      intent: affirm
      value: true
      conditions:
      - active_loop: symptom_checker_form
        requested_slot: reproductive_symptoms
  urinary_symptoms:
    type: text
    mappings:
    - type: from_intent
      intent: deny
      value: false
      conditions:
      - active_loop: symptom_checker_form
        requested_slot: urinary_symptoms
    - type: from_intent
      intent: affirm
      value: true
      conditions:
      - active_loop: symptom_checker_form
        requested_slot: urinary_symptoms
    - type: from_entity
      entity: symptom
      conditions:
      - active_loop: symptom_checker_form
        requested_slot: urinary_symptoms
  unsterile_injections_symptoms:
    type: text
    mappings:
    - type: from_intent
      intent: deny
      value: false
      conditions:
      - active_loop: symptom_checker_form
        requested_slot: unsterile_injections_symptoms
    - type: from_intent
      intent: affirm
      value: true
      conditions:
      - active_loop: symptom_checker_form
        requested_slot: unsterile_injections_symptoms
  family_history:
    type: text
    mappings:
    - type: from_intent
      intent: deny
      value: false
      conditions:
      - active_loop: symptom_checker_form
        requested_slot: family_history
    - type: from_intent
      intent: affirm
      value: true
      conditions:
      - active_loop: symptom_checker_form
        requested_slot: family_history
  extra_marital_contacts:
    type: text
    mappings:
    - type: from_intent
      intent: deny
      value: false
      conditions:
      - active_loop: symptom_checker_form
        requested_slot: extra_marital_contacts
    - type: from_intent
      intent: affirm
      value: true
      conditions:
      - active_loop: symptom_checker_form
        requested_slot: extra_marital_contacts
  liver_failure:
    type: text
    mappings:
    - type: from_intent
      intent: deny
      value: false
      conditions:
      - active_loop: symptom_checker_form
        requested_slot: liver_failure
    - type: from_intent
      intent: affirm
      value: true
      conditions:
      - active_loop: symptom_checker_form
        requested_slot: liver_failure
  disease:
    type: text
    mappings:
    - type: from_entity
      entity: disease
forms:
  symptom_checker_form:
    required_slots:
    - alcohol_consumption
    - liver_failure
    - flu_symptoms
    - respiratory_symptoms
    - gastro_symptoms
    - neuro_symptoms
    - body_pain_symptoms
    - skin_nails_symptoms
    - internal_itching_symptoms
    - appearance_symptoms
    - reproductive_symptoms
    - urinary_symptoms
    - unsterile_injections_symptoms
    - blood_transfusions
    - family_history
    - extra_marital_contacts
responses:
  utter_greet:
  - text: Hi there! I"m DiagnoBot, a medical chatbot!
  utter_goodbye:
  - text: Thank"s for using my assistance! I"ll be here when you need me.
  utter_default_menu:
  - text: What would you like to try today?
    buttons:
    - title: Symptom Checker
      payload: /symptom_checker
    - title: Learn more about a disease
      payload: /select_diseases
  utter_symptom_checker:
  - text: The Symptom Checker is a program that predicts your disease based on your symptoms. If you insert atleast 2 symptoms, I will predict your disease!
  utter_thanks:
  - text: Thank you for entering your symptoms!
  utter_ask_flu_symptoms:
  - text: |-
      Are you experiencing any of the following symptoms: (Type "None" if none apply) 
      - Blurred and distorted vision
      - Chills
      - Cold hands and feet
      - Cramps
      - Dehydration
      - Fatigue
      - Fast heart rate
      - Fluid overload in your body
      - High fever
      - Irregular sugar level
      - Loss of smell
      - Malaise: General feeling of discomfort or uneasiness
      - Mild fever
      - Obesity
      - Palpitations
      - Restlessness
      - Shivering
      - Sweating
  utter_ask_respiratory_symptoms:
  - text: |-
      Are you experiencing  any of the following respiratory symptoms: (Type "None" if none apply) 
      - Blood in sputum
      - Breathlessness
      - Congestion
      - Continuous sneezing
      - Cough
      - Mucoid sputum: clear, white, or grey mucus
      - Phlegm
      - Runny nose
      - Rusty sputum: redish-brown mucus when coughing
      - Sinus pressure
      - Throat irritation
  utter_ask_gastro_symptoms:
  - text: |-
      Are you experiencing any of the following symptoms related to your stomach or digestive system: (Type "None" if none apply) 
      - Acidity such as acid reflux or heartburn
      - Belly pain
      - Constipation
      - Cramps
      - Diarrhea
      - Distention of abdomen: feeling of being bloated
      - Excessive hunger
      - Indigestion
      - Increased appetite
      - Loss of Appetite
      - Nausea
      - Swelling of Stomach
      - Stomach bleeding
      - Vomiting
  utter_ask_neuro_symptoms:
  - text: |-
      Are you experiencing any of the following symptoms related to your nervous system: (Type "None" if none apply) 
      - Altered sensorium which includes confusion, amnesia, etc.
      - Anxiety
      - Depression
      - Dizziness
      - Headache
      - Irritability
      - Lack of concentration
      - Lethargy
      - Loss of balance
      - Mood swings
      - Movement stiffness
      - Muscle weakness
      - Muscle wasting
      - Painful walking
      - Slurred speech
      - Spinning movements
      - Stiff neck
      - Unsteadiness
      - Visual disturbances
      - Weakness in limbs
      - Weakness of one body side
  utter_ask_body_pain_symptoms:
  - text: |-
      Are you experiencing pain in any of the following areas: (Type "None" if none apply) 
      - Abdominal pain
      - Back pain
      - Chest pain
      - Hip joint pain
      - Joint pain
      - Knee pain
      - Muscle pain
      - Neck pain
      - Pain behind the eyes
      - Pain in Anal Region
      - Stomach pain
  utter_ask_skin_nails_symptoms:
  - text: |-
      Have you noticed any of the following issues with your skin or nails lately: (Type "None" if none apply) 
      - Blackheads
      - Blister
      - Brittle nails
      - Bruising
      - Dischromic patches - skin discoloration or patches of uneven color
      - Drying and tingling lips
      - Inflammatory nails
      - Itching
      - Nodal skin eruptions
      - Pus filled pimples
      - Red sore around nose
      - Red spots over body
      - Skin peeling
      - Skin rash
      - Silver like dusting
      - Small dents in nails
      - Yellow crust ooze
      - Yellowish skin
  utter_ask_internal_itching_symptoms:
  - text: Do you feel any internal itching?
    buttons:
    - title: Yes
      payload: /affirm
    - title: No
      payload: /deny
  utter_ask_blood_transfusions:
  - text: Have you received any blood transfusions?
    buttons:
    - title: Yes
      payload: /affirm
    - title: No
      payload: /deny
  utter_ask_alcohol_consumption:
  - text: Do you have a history of alcohol consumption?
    buttons:
    - title: Yes
      payload: /affirm
    - title: No
      payload: /deny
  utter_ask_liver_failure:
  - text: Do you have acute liver failure?
    buttons:
    - title: Yes
      payload: /affirm
    - title: No
      payload: /deny
  utter_ask_appearance_symptoms:
  - text: |-
      Have you noticed the following changes in your appearance: (Type "None" if none apply) 
      - Enlarged thyroid
      - Patches in throat
      - Prominent veins on calf
      - Puffy face and eyes
      - Redness of eyes
      - Swelled lymph nodes
      - Swollen blood vessels
      - Swollen extremities
      - Swollen legs
      - Swelling joints
      - Sunken eyes
      - Toxic look: typhos
      - Ulcers on tongue
      - Watering from eyes
      - Weight gain
      - Weight loss
      - Yellowing of eyes
  utter_ask_reproductive_symptoms:
  - text: If applicable, are you experiencing any abnormal menstrual symptoms?
    buttons:
    - title: Yes
      payload: /affirm
    - title: No
      payload: /deny
    - title: Not applicable
      payload: /deny
  utter_ask_urinary_symptoms:
  - text: |
      Are you experiencing any of the following urinary symptoms: (Type "None" if none apply) 
      - Bladder discomfort
      - Bloody stool
      - Burning micturition: buringing feeling during urination
      - Continuous feel of urine
      - Dark urine
      - Foul smell of urine
      - Irritation in anus
      - Pain during bowel movements
      - Passage of gases
      - Polyuria: excessive urination
      - Spotting urination
      - Yellow urine
  utter_ask_unsterile_injections_symptoms:
  - text: Do you believe you have received any unsterile injections lately?
    buttons:
    - title: Yes
      payload: /affirm
    - title: No
      payload: /deny
  utter_ask_family_history:
  - text: Do you have a family history of any illnesses or medical conditions?
    buttons:
    - title: Yes
      payload: /affirm
    - title: No
      payload: /deny
  utter_ask_extra_marital_contacts:
  - text: Do you have extra marital contacts?
    buttons:
    - title: Yes
      payload: /affirm
    - title: No
      payload: /deny
actions:
- action_confirm_symptoms
- action_predict_disease
- utter_thanks
- utter_symptom_checker
- action_reset_symptoms
- utter_default_menu
- action_select_diseases
- utter_greet
- validate_symptom_checker_form
- utter_goodbye
session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true
