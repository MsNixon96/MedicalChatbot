version: '3.1'
intents:
- affirm
- confirm_symptoms
- deny
- goodbye
- greet
- select_diseases
- select_symptom
- start_over
- symptom_checker
entities:
- symptom
- disease
slots:
  symptoms:
    type: list
    mappings:
    - type: custom
  flu_symptoms:
    type: text
    mappings:
    - type: from_intent
      intent: deny
      value: false
      conditions:
      - active_loop: symptom_checker_form
        requested_slot: flu_symptoms
    - type: from_entity
      entity: symptom
      conditions:
      - active_loop: symptom_checker_form
        requested_slot: flu_symptoms
  respiratory_symptoms:
    type: text
    mappings:
    - type: from_intent
      intent: deny
      value: false
      conditions:
      - active_loop: symptom_checker_form
        requested_slot: respiratory_symptoms
    - type: from_entity
      entity: symptom
      conditions:
      - active_loop: symptom_checker_form
        requested_slot: respiratory_symptoms
  gastro_symptoms:
    type: text
    mappings:
    - type: from_intent
      intent: deny
      value: false
      conditions:
      - active_loop: symptom_checker_form
        requested_slot: gastro_symptoms
    - type: from_entity
      entity: symptom
      conditions:
      - active_loop: symptom_checker_form
        requested_slot: gastro_symptoms
  neuro_symptoms:
    type: text
    mappings:
    - type: from_intent
      intent: deny
      value: false
      conditions:
      - active_loop: symptom_checker_form
        requested_slot: neuro_symptoms
    - type: from_entity
      entity: symptom
      conditions:
      - active_loop: symptom_checker_form
        requested_slot: neuro_symptoms
  body_pain_symptoms:
    type: text
    mappings:
    - type: from_intent
      intent: deny
      value: false
      conditions:
      - active_loop: symptom_checker_form
        requested_slot: body_pain_symptoms
    - type: from_entity
      entity: symptom
      conditions:
      - active_loop: symptom_checker_form
        requested_slot: body_pain_symptoms
  skin_nails_symptoms:
    type: text
    mappings:
    - type: from_intent
      intent: deny
      value: false
      conditions:
      - active_loop: symptom_checker_form
        requested_slot: skin_nails_symptoms
    - type: from_entity
      entity: symptom
      conditions:
      - active_loop: symptom_checker_form
        requested_slot: skin_nails_symptoms
  internal_itching_symptoms:
    type: text
    mappings:
    - type: from_intent
      intent: deny
      value: false
      conditions:
      - active_loop: symptom_checker_form
        requested_slot: internal_itching_symptoms
    - type: from_intent
      intent: affirm
      value: true
      conditions:
      - active_loop: symptom_checker_form
        requested_slot: internal_itching_symptoms
  appearance_symptoms:
    type: text
    mappings:
    - type: from_intent
      intent: deny
      value: false
      conditions:
      - active_loop: symptom_checker_form
        requested_slot: appearance_symptoms
    - type: from_entity
      entity: symptom
      conditions:
      - active_loop: symptom_checker_form
        requested_slot: appearance_symptoms
  reproductive_symptoms:
    type: text
    mappings:
    - type: from_intent
      intent: deny
      value: false
      conditions:
      - active_loop: symptom_checker_form
        requested_slot: reproductive_symptoms
    - type: from_intent
      intent: affirm
      value: true
      conditions:
      - active_loop: symptom_checker_form
        requested_slot: reproductive_symptoms
  urinary_symptoms:
    type: text
    mappings:
    - type: from_intent
      intent: deny
      value: false
      conditions:
      - active_loop: symptom_checker_form
        requested_slot: urinary_symptoms
    - type: from_intent
      intent: affirm
      value: true
      conditions:
      - active_loop: symptom_checker_form
        requested_slot: urinary_symptoms
    - type: from_entity
      entity: symptom
      conditions:
      - active_loop: symptom_checker_form
        requested_slot: urinary_symptoms
  unsterile_injections_symptoms:
    type: text
    mappings:
    - type: from_intent
      intent: deny
      value: false
      conditions:
      - active_loop: symptom_checker_form
        requested_slot: unsterile_injections_symptoms
    - type: from_intent
      intent: affirm
      value: true
      conditions:
      - active_loop: symptom_checker_form
        requested_slot: unsterile_injections_symptoms
  family_history:
    type: text
    mappings:
    - type: from_intent
      intent: deny
      value: false
      conditions:
      - active_loop: symptom_checker_form
        requested_slot: family_history
    - type: from_intent
      intent: affirm
      value: true
      conditions:
      - active_loop: symptom_checker_form
        requested_slot: family_history
  disease:
    type: text
    mappings:
    - type: from_entity
      entity: disease
forms:
  symptom_checker_form:
    required_slots:
    - flu_symptoms
    - respiratory_symptoms
    - gastro_symptoms
    - neuro_symptoms
    - body_pain_symptoms
    - skin_nails_symptoms
    - internal_itching_symptoms
    - appearance_symptoms
    - reproductive_symptoms
    - urinary_symptoms
    - unsterile_injections_symptoms
    - family_history
responses:
  utter_greet:
  - text: Hi there! I"m DiagnoBot, a medical chatbot!
  utter_goodbye:
  - text: Thank"s for using my assistance! I"ll be here when you need me.
  utter_default_menu:
  - text: What would you like to try today?
    buttons:
    - title: Symptom Checker
      payload: /symptom_checker
    - title: Learn more about a disease
      payload: /select_diseases
  utter_symptom_checker:
  - text: The Symptom Checker is a program that predicts your disease based on your symptoms. If you insert atleast 5 symptoms, I will predict your disease!
  utter_thanks:
  - text: Thank you for entering your symptoms!
  utter_ask_flu_symptoms:
  - text: |-
      Are you experiencing any of the following symptoms: (Type "None" if none apply) 
      - Dehydration 
      - Fatigue 
      - High fever 
      - Mild fever 
      - Loss of smell 
      - Shivering 
      - Sweating 
      - Weight loss 
      - Chills 
      - Malaise - General feeling of discomfort or uneasiness
  utter_ask_respiratory_symptoms:
  - text: |-
      Are you experiencing  any of the following respiratory symptoms: (Type "None" if none apply) 
      - Cough 
      - Rusty sputum - redish-brown mucus when coughing 
      - Breathlessness
  utter_ask_gastro_symptoms:
  - text: |-
      Are you experiencing any of the following symptoms related to your stomach or digestive system: (Type "None" if none apply) 
      - Constipation 
      - Diarrhea 
      - Nausea 
      - Vomiting 
      - Swelling of Stomach 
      - Loss of Appetite 
      - Acidity such as acid reflux or heartburn
  utter_ask_neuro_symptoms:
  - text: |-
      Are you experiencing any of the following symptoms related to your nervous system: (Type "None" if none apply) 
      - Headache 
      - Irritability 
      - Lack of concentration 
      - Loss of balance 
      - Muscle weakness 
      - Painful walking 
      - Slurred speech 
      - Stiff neck 
      - Unsteadiness 
      - Altered sensorium which includes confusion, amnesia, etc.
  utter_ask_body_pain_symptoms:
  - text: |-
      Are you experiencing pain in any of the following areas: (Type "None" if none apply) 
      - Chest pain 
      - Joints pain 
      - Knees pain 
      - Muscles pain 
      - Neck pain 
      - Pain in Anal Region
  utter_ask_skin_nails_symptoms:
  - text: |-
      Have you noticed any of the following issues with your skin or nails lately: (Type "None" if none apply) 
      - Bruising 
      - Itching 
      - Nodal skin eruptions 
      - Pus filled pimples 
      - Red spots over body 
      - Skin rash 
      - Yellow crust ooze 
      - Yellowish skin 
      - Small dents in nails 
      - Brittle nails
  utter_ask_internal_itching_symptoms:
  - text: Do you feel any internal itching?
    buttons:
    - title: Yes
      payload: /affirm
    - title: No
      payload: /deny
  utter_ask_appearance_symptoms:
  - text: |-
      Have you noticed the following changes in your appearance: (Type "None" if none apply) 
      - Yellowing of eyes 
      - Patches in throat
  utter_ask_reproductive_symptoms:
  - text: If applicable, are you experiencing any abnormal menstrual symptoms?
    buttons:
    - title: Yes
      payload: /affirm
    - title: No
      payload: /deny
    - title: Not applicable
      payload: /deny
  utter_ask_urinary_symptoms:
  - text: |-
      Are you experiencing any of the following urinary symptoms: (Type "None" if none apply) 
      - Dark urine 
      - Spotting during urination 
      - Bladder discomfort 
      - Excessive urination
  utter_ask_unsterile_injections_symptoms:
  - text: Do you believe you have received any unsterile injections lately?
    buttons:
    - title: Yes
      payload: /affirm
    - title: No
      payload: /deny
  utter_ask_family_history:
  - text: Do you have a family history of any illnesses or medical conditions?
    buttons:
    - title: Yes
      payload: /affirm
    - title: No
      payload: /deny
actions:
- utter_thanks
- action_predict_disease
- utter_symptom_checker
- action_confirm_symptoms
- action_select_diseases
- action_reset_symptoms
- utter_greet
- utter_default_menu
- validate_symptom_checker_form
- utter_goodbye
session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true
