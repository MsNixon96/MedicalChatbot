version: "3.1"

rules:

- rule: Say goodbye anytime the user says goodbye
  steps:
  - intent: goodbye
  - action: utter_goodbye

- rule: Say hi anytime the user says hi
  steps:
  - intent: greet
  - action: utter_greet
  - action: utter_default_menu

- rule: Activate symptom checker form
  steps:
  - intent: symptom_checker
  - action: utter_symptom_checker
  - action: symptom_checker_form
  - active_loop: symptom_checker_form

- rule: Submit symptom checker form
  condition:
  - active_loop: symptom_checker_form
  steps:
  - action: symptom_checker_form
  - active_loop: null
  - slot_was_set:
    - requested_slot: null
  - action: utter_thanks
  - action: action_confirm_symptoms

- rule: Confirm symptoms
  steps:
  - intent: confirm_symptoms
  - action: action_confirm_symptoms

- rule: Reset symptoms
  steps:
  - action: action_confirm_symptoms
  - intent: start_over
  - action: action_reset_symptoms
  - action: symptom_checker_form
  - active_loop: symptom_checker_form

- rule: Select disease
  steps:
  - intent: select_diseases
  - action: action_select_diseases

- rule: predict disease
  steps:
  - action: action_confirm_symptoms
  - intent: affirm
  - action: action_predict_disease
