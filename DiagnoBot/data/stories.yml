  - intent: symptom_checker
  - action: utter_symptom_checker
  - action: utter_ask_symptoms
  - intent: select_symptoms
    entities:
    - symptom: anxiety
    - symptom: depression
  - action: action_select_symptoms
  - slot_was_set:
    - symptoms:
      - anxiety
      - depression
  - or:
    - intent: complete
    - intent: deny
  - action: action_predict_disease
  - or:
    - intent: complete
    - intent: deny
  - action: utter_default_menu

- story: A disease prediction was made on the second attempt after user entered more symptoms
